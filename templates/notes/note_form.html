{% extends 'base.html' %}

{% block title %}Create Note{% endblock %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h2 style="margin-bottom: 1.5rem;">Create a Note</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: var(--danger-color); font-size: 0.85rem; margin-top: 0.25rem;">{{ field.errors.0 }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn">Save Note</button>
            <a href="{% url 'note_list' %}" class="btn btn-outline" style="vertical-align: middle; display:inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-color); text-decoration: none; color: var(--text-color); border-radius: 8px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
