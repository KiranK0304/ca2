{% extends 'base.html' %}

{% block title %}Confirm Delete{% endblock %}

{% block content %}
<div class="form-container">
    <h2 style="margin-bottom: 1rem; color: var(--danger-color);">Delete Note?</h2>
    <p style="margin-bottom: 1.5rem;">Are you sure you want to delete the note <strong>"{{ object.title }}"</strong>? This action cannot be undone.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'note_list' %}" class="btn btn-outline" style="vertical-align: middle; display:inline-block; padding: 0.5rem 1rem; border: 1px solid var(--border-color); text-decoration: none; color: var(--text-color); border-radius: 8px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
