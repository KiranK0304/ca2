<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Notes App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #111827;
            --text-muted: #6b7280;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 1.5rem; font-weight: 600; }
        .header a { text-decoration: none; color: var(--primary-color); font-weight: 500; margin-left: 1rem; }
        .header .auth-links form { display: inline; }
        .header .auth-links button { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; font-family: inherit; margin-left:1rem; font-weight:500; text-decoration: underline;}
        .card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .btn { display: inline-block; background: var(--primary-color); color: #fff; padding: 0.6rem 1.2rem; border-radius: 8px; text-decoration: none; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: background 0.2s; }
        .btn:hover { background: var(--primary-hover); }
        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: var(--danger-hover); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .btn-outline:hover { background: var(--bg-color); }
        .form-container { background: var(--card-bg); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); max-width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-color); }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .form-actions { margin-top: 1.5rem; display: flex; gap: 1rem; align-items: center; }
        .meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h1><a href="{% url 'note_list' %}" style="text-decoration:none; color:var(--text-color);">Notes</a></h1>
            </div>
            <div class="auth-links">
                {% if user.is_authenticated %}
                    <span>Hello, {{ user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}">Register</a>
                {% endif %}
            </div>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
